<div class="permission-wrapper">
    <div class="header-card">
        <div class="title-group">
            <h1><i class="fas fa-user-lock"></i> Gestion des Droits d'Accès</h1>
            <p>Configurez les permissions granulaires pour chaque module du système Lumière.</p>
        </div>

        <div class="role-selector-box">
            <label>Rôle à configurer :</label>
            <div class="custom-select">
                <select [(ngModel)]="selectedRole" class="role-dropdown">
                    <option *ngFor="let role of roles" [value]="role">{{ role }}</option>
                </select>
                <i class="fas fa-caret-down"></i>
            </div>
        </div>
    </div>

    <div class="content-area">
        <div class="module-accordions">
            <div *ngFor="let mod of modules" class="module-card" [class.expanded]="expandedModule === mod.key">

                <div class="module-header" (click)="toggleModule(mod.key)">
                    <div class="module-identity">
                        <div class="module-icon-container">
                            <i [class]="mod.icon"></i>
                        </div>
                        <div class="module-info">
                            <span class="module-name">{{ mod.label }}</span>
                            <span class="module-status" *ngIf="getPermission(mod.key) as p">
                                <span class="status-badge" [class.enabled]="p.enabled">
                                    {{ p.enabled ? 'Accès Activé' : 'Accès Refusé' }}
                                </span>
                                <span class="action-count" *ngIf="mod.actions.length > 0">
                                    {{ mod.actions.length }} options de contrôle
                                </span>
                            </span>
                        </div>
                    </div>

                    <div class="module-controls">
                        <label class="main-toggle" (click)="$event.stopPropagation()">
                            <input type="checkbox" *ngIf="getPermission(mod.key) as p" [(ngModel)]="p.enabled">
                            <span class="toggle-slider"></span>
                        </label>
                        <i class="fas fa-chevron-right chevron-icon"></i>
                    </div>
                </div>

                <div class="module-body" *ngIf="mod.actions.length > 0">
                    <div class="actions-grid">
                        <div class="action-card" *ngFor="let action of mod.actions">
                            <div class="action-info">
                                <span class="action-label">{{ action.label }}</span>
                                <small class="action-key">{{ action.key }}</small>
                            </div>
                            <div class="action-switch">
                                <label class="switch">
                                    <input type="checkbox" *ngIf="getPermission(action.key) as subP"
                                        [(ngModel)]="subP.enabled" [disabled]="!getPermission(mod.key)?.enabled">
                                    <span class="slider round"></span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="floating-save-panel">
        <button class="save-btn" (click)="savePermissions()" [disabled]="isLoading"
            title="Enregistrer la Configuration">
            <i class="fas fa-save" *ngIf="!isLoading"></i>
            <span class="loader" *ngIf="isLoading"></span>
        </button>
    </div>
</div>

<div class="auth-wrapper">
    <div class="auth-card register-wide">
        <div class="auth-header">
            <div class="auth-logo">
                <img src="assets/Lumiere-Logistique.png" alt="Lumière Logistique">
            </div>
            <h2>Créer un Compte</h2>
            <p class="auth-subtitle">Rejoignez Lumière aujourd'hui</p>
        </div>

        <!-- Success Message -->
        <div *ngIf="success" class="auth-success">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h3>Inscription réussie !</h3>
            <div class="success-details">
                <p><i class="fas fa-envelope"></i> Confirmation envoyée à <strong>{{user.email}}</strong></p>
                <p><i class="fas fa-clock"></i> En attente de validation par l'administrateur</p>
            </div>
            <p class="redirect-hint">Redirection en cours...</p>
        </div>

        <!-- Registration Form -->
        <form *ngIf="!success" class="auth-form" (ngSubmit)="onSubmit()">
            <div class="form-row">
                <div class="form-group">
                    <label>Prénom</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" [(ngModel)]="user.firstname" name="firstname" placeholder="Ex: Jean"
                            required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Nom</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" [(ngModel)]="user.lastname" name="lastname" placeholder="Ex: Dupont"
                            required>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Email Professionnel</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" [(ngModel)]="user.email" name="email" placeholder="votre@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Mot de passe</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" [(ngModel)]="user.password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <div *ngIf="error" class="auth-error">
                <i class="fas fa-exclamation-circle"></i> {{error}}
            </div>

            <button type="submit" class="auth-btn">
                <i class="fas fa-user-plus"></i>
                <span>S'inscrire Maintenant</span>
            </button>

            <div class="auth-footer">
                <span>Vous avez déjà un compte ?</span>
                <a routerLink="/login">Se connecter</a>
            </div>
        </form>
    </div>
</div>

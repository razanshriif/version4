<div class="chatbot-container">
    <!-- Decorative Glowing Blobs (Visible only when chat is open) -->
    <div class="glass-blobs" *ngIf="isChatOpen">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Floating Action Button -->
    <div class="chatbot-button" (click)="toggleChat()" [class.active]="isChatOpen">
        <i class="fas" [ngClass]="isChatOpen ? 'fa-times' : 'fa-comments-alt'"></i>
        <span class="notification-badge" *ngIf="!isChatOpen && unreadCount > 0">{{unreadCount}}</span>
    </div>

    <!-- Premium Chat Window -->
    <div class="chat-window" [class.open]="isChatOpen">
        <!-- Modern Header -->
        <div class="chat-header">
            <div class="header-content">
                <div class="bot-avatar">
                    <i class="fad fa-robot-astromech"></i>
                </div>
                <div class="header-info">
                    <h3>Assistant Lumière</h3>
                    <p class="status">
                        <span class="status-dot"></span>
                        AI Powered Agent
                    </p>
                </div>
            </div>
            <button class="close-btn" (click)="toggleChat()">
                <i class="fal fa-chevron-down"></i>
            </button>
        </div>

        <!-- Messages Flow -->
        <div class="chat-messages" #messagesContainer>
            <div class="message-wrapper" *ngFor="let message of messages; let i = index" 
                 [class.user-message]="message.isUser"
                 [class.bot-message]="!message.isUser"
                 [style.animation-delay]="(i * 0.1) + 's'">
                <div class="message">
                    <div class="message-content">
                        <p>{{message.text}}</p>
                        <span class="message-time">{{message.time}}</span>
                    </div>
                </div>
            </div>

            <!-- Modern Typing Indicator -->
            <div class="typing-indicator" *ngIf="isTyping">
                <div class="typing-dot" style="animation-delay: 0s"></div>
                <div class="typing-dot" style="animation-delay: 0.1s"></div>
                <div class="typing-dot" style="animation-delay: 0.2s"></div>
            </div>
        </div>

        <!-- Smart Suggestions -->
        <div class="quick-replies" *ngIf="showQuickReplies">
            <button class="quick-reply-btn" *ngFor="let reply of quickReplies" (click)="sendQuickReply(reply)">
                {{reply}}
            </button>
        </div>

        <!-- Ultra-Clean Input -->
        <div class="chat-input">
            <input type="text" [(ngModel)]="userInput" (keyup.enter)="sendMessage()"
                placeholder="Ask me anything..." [disabled]="isTyping">
            <button class="send-btn" (click)="sendMessage()" [disabled]="!userInput.trim() || isTyping">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<ion-header class="ion-no-border">
  <div class="lum-logo-bar">
    <div class="lum-logo-wrap">
      <img src="assets/icon/lum.png" alt="L" />
    </div>
    <div class="lum-logo-actions">
      <button class="lum-icon-btn" (click)="goToNotifications()">
        <ion-icon name="notifications-outline"></ion-icon>
      </button>
      <button class="lum-icon-btn" (click)="logout()">
        <ion-icon name="log-out-outline"></ion-icon>
      </button>
    </div>
  </div>

  <div class="lum-sub-bar">
    <button class="lum-back-btn" (click)="navCtrl.back()">
      <ion-icon name="arrow-back-outline"></ion-icon>
    </button>
    <h1 class="lum-page-title">Localisation</h1>
  </div>
</ion-header>

<ion-content [fullscreen]="true" class="map-content">
  <div class="map-wrapper">
    <google-map height="100%" width="100%" [center]="center" [zoom]="zoom" [options]="mapOptions">
      <!-- Markers -->
      <map-marker *ngIf="sourceMarker" [position]="sourceMarker.position" [options]="sourceMarker.options">
      </map-marker>
      <map-marker *ngIf="destinationMarker" [position]="destinationMarker.position" [options]="destinationMarker.options">
      </map-marker>
      <map-marker *ngIf="vehicleMarker" [position]="vehicleMarker.position" [options]="vehicleMarker.options">
      </map-marker>

      <!-- Polyline (optional/future) -->
    </google-map>
  </div>

  <div class="map-overlay-card" *ngIf="selectedLivraison">
    <div class="card-header">
      <span class="order-id">#{{ selectedLivraison.id }}</span>
      <span class="status-pill {{ getStatusKey(selectedLivraison.statut) }}">
        {{ selectedLivraison.statut }}
      </span>
    </div>
    <div class="card-route">
      <div class="route-item">
        <span class="emoji">🟢</span>
        <span class="city">{{ selectedLivraison.chargementVille }}</span>
      </div>
      <div class="connector"></div>
      <div class="route-item">
        <span class="emoji">📍</span>
        <span class="city">{{ selectedLivraison.livraisonVille }}</span>
      </div>
    </div>
  </div>
</ion-content>

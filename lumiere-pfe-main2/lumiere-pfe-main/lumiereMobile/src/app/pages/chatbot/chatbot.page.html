<ion-header class="ion-no-border inner-page-header">
  <ion-toolbar class="premium-toolbar">
    <div class="header-wrapper-global">
      <div class="header-left-group">
        <button type="button" class="header-round-btn" (click)="navCtrl.back()">
          <ion-icon name="arrow-back-outline"></ion-icon>
        </button>
        <span class="header-page-title">IA Lumière</span>
      </div>
      <div class="header-right-group">
        <button type="button" class="header-round-btn" (click)="clearChat()" aria-label="Effacer">
          <ion-icon name="trash-outline"></ion-icon>
        </button>
        <!-- Logo removed -->
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="premium-content">
  <div class="glass-background">
    <div class="bubble"></div>
    <div class="bubble"></div>
  </div>

  <div class="chat-container">
    <div class="messages-wrapper">
      <div *ngFor="let message of messages" class="message-row" [class.user-message]="message.isUser"
        [class.bot-message]="!message.isUser">
        <div class="message-bubble">
          <div class="message-text">{{ message.text }}</div>
          <div class="message-time">{{ getMessageTime(message.timestamp) }}</div>
        </div>
      </div>

      <div *ngIf="isTyping" class="message-row bot-message">
        <div class="message-bubble typing-indicator">
          <div class="typing-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </div>


  </div>
</ion-content>

<ion-footer class="ion-no-border">
  <div class="input-container">
    <ion-textarea [(ngModel)]="userInput" placeholder="Écrivez votre message..." rows="1" autoGrow="true"
      (keyup.enter)="sendMessage()"></ion-textarea>
    <ion-button class="send-btn" (click)="sendMessage()" [disabled]="!userInput.trim()">
      <ion-icon name="send" slot="icon-only"></ion-icon>
    </ion-button>
  </div>
</ion-footer>

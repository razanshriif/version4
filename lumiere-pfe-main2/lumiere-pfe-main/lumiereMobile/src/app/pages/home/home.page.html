<!-- ══ HEADER — Level 1: Orange logo bar ══ -->
<ion-header class="ion-no-border">
  <div class="lum-logo-bar">
    <div class="lum-logo-wrap">
      <img src="assets/icon/lum.png" alt="L" />
    </div>
    <div class="lum-logo-actions">
      <button class="lum-icon-btn" (click)="goToNotifications()">
        <ion-icon name="notifications-outline"></ion-icon>
        <span class="lum-pip" *ngIf="stats.notifications > 0"></span>
      </button>
      <button class="lum-icon-btn" (click)="logout()">
        <ion-icon name="log-out-outline"></ion-icon>
      </button>
    </div>
  </div>
</ion-header>

<!-- ══ CONTENT ══ -->
<ion-content class="home-content">
  <ion-refresher slot="fixed" (ionRefresh)="refreshData($event)">
    <ion-refresher-content refreshingSpinner="dots"></ion-refresher-content>
  </ion-refresher>

  <!-- Level 2: Greeting bar -->
  <div class="greeting-bar fade-up">
    <div class="greeting__info">
      <div class="greeting__date">{{ getCurrentDate() }}</div>
      <h1 class="greeting__name">{{ getUsername() }}</h1>
    </div>
    <div class="rappel-btn" (click)="goToRappels()">
      <ion-icon name="time-outline"></ion-icon>
    </div>
  </div>

  <div class="home-body">
    <!-- Actions Rapides -->
    <section>
      <div class="sec-label fade-up">Actions Rapides</div>

      <div class="action-grid" *ngIf="!isLoading">
        <!-- Mes Ordres -->
        <div class="acard fade-up" (click)="navigateTo('/demandes/list')">
          <div class="acard__top">
            <div class="ds-icon-pill"><ion-icon name="cube-outline"></ion-icon></div>
            <div class="acard__title">Mes Ordres</div>
            <div class="acard__desc">Gérer vos expéditions</div>
          </div>
          <div class="acard__more">Voir <ion-icon name="arrow-forward-outline"></ion-icon></div>
        </div>

        <!-- Répertoire -->
        <div class="acard fade-up" (click)="navigateTo('/clients')">
          <div class="acard__top">
            <div class="ds-icon-pill"><ion-icon name="people-outline"></ion-icon></div>
            <div class="acard__title">Clients</div>
            <div class="acard__desc">Carnet d'adresses</div>
          </div>
          <div class="acard__more">Voir <ion-icon name="arrow-forward-outline"></ion-icon></div>
        </div>

        <!-- Livraisons -->
        <div class="acard fade-up" (click)="navigateTo('/livraisons/list')">
          <div class="acard__top">
            <div class="ds-icon-pill"><ion-icon name="car-outline"></ion-icon></div>
            <div class="acard__title">Livraisons</div>
            <div class="acard__desc">Suivi journalier</div>
          </div>
          <div class="acard__more">Voir <ion-icon name="arrow-forward-outline"></ion-icon></div>
        </div>

        <!-- Nouvelle Commande -->
        <div class="acard fade-up" (click)="navigateTo('/demandes/create')">
          <div class="acard__top">
            <div class="ds-icon-pill"><ion-icon name="add-circle-outline"></ion-icon></div>
            <div class="acard__title">Saisie</div>
            <div class="acard__desc">Nouvel ordre</div>
          </div>
          <div class="acard__more">Créer <ion-icon name="arrow-forward-outline"></ion-icon></div>
        </div>
      </div>
    </section>

    <!-- Brouillons -->
    <section *ngIf="mesDrafts && mesDrafts.length > 0">
      <div class="sec-label fade-up">Brouillons</div>

      <div class="draft-list">
        <div class="draft-card fade-up" *ngFor="let d of mesDrafts.slice(0, 3)" (click)="viewDemandeDetails(d)">
          <div class="draft__info">
            <span class="draft__name">{{ d.chargementNom || 'Nom non défini' }}</span>
            <span class="draft__date">{{ formatDate(d.dateSaisie) }}</span>
          </div>
          <div class="draft__badge">Brouillon</div>
        </div>
      </div>
    </section>

    <div class="spacer"></div>
  </div>
</ion-content>
